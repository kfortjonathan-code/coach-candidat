<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach du candidat — BEPC & Bac Côte d'Ivoire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF6EC;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: white;
    }
    header {
      background: #1F4438;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #E8C547;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1F4438;
      flex-shrink: 0;
    }
    header h1 {
      color: #FAF6EC;
      font-size: 17px;
      font-weight: 600;
    }
    header p {
      color: #9FC4B3;
      font-size: 12px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      gap: 10px;
      max-width: 90%;
    }
    .msg.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .msg.assistant .avatar { background: #1F4438; color: #E8C547; }
    .msg.user .avatar { background: #E8C547; color: #1F4438; }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble { background: #F1ECDD; color: #2B2B26; border-top-left-radius: 4px; }
    .msg.user .bubble { background: #1F4438; color: #FAF6EC; border-top-right-radius: 4px; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .suggestion-btn {
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(31,68,56,0.2);
      background: white;
      color: #1F4438;
      cursor: pointer;
    }
    .suggestion-btn:hover { background: #1F4438; color: #FAF6EC; }
    .input-area {
      padding: 14px;
      border-top: 1px solid rgba(31,68,56,0.1);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      max-height: 120px;
    }
    textarea:focus { outline: 2px solid rgba(31,68,56,0.3); }
    button.send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #E8C547;
      border: none;
      font-weight: bold;
      color: #1F4438;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 18px;
    }
    button.send:disabled { opacity: 0.4; cursor: default; }
    .typing { display: flex; gap: 4px; padding: 14px 16px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(31,68,56,0.4);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">C</div>
      <div>
        <h1>Coach du candidat</h1>
        <p>BEPC · Bac — Côte d'Ivoire</p>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Pose ta question, demande un exercice..."></textarea>
      <button class="send" id="sendBtn">→</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    let history = [
      { role: "assistant", content: "Salut ! Je suis Coach 👋 Je suis là pour t'aider à préparer ton BEPC ou ton Bac. Pose-moi une question sur un cours, demande un exercice, ou dis-moi simplement ce qui te bloque. On avance ensemble." }
    ];

    const suggestions = [
      "Je ne comprends pas le théorème de Pythagore",
      "Explique-moi la conjugaison du subjonctif",
      "Donne-moi un exercice de maths niveau BEPC",
      "Comment faire un bon résumé de texte ?"
    ];

    function render() {
      messagesEl.innerHTML = "";
      history.forEach(m => {
        const div = document.createElement("div");
        div.className = "msg " + m.role;
        div.innerHTML = `
          <div class="avatar">${m.role === "assistant" ? "C" : "Toi"}</div>
          <div class="bubble"></div>
        `;
        div.querySelector(".bubble").textContent = m.content;
        messagesEl.appendChild(div);
      });

      if (history.length === 1) {
        const wrap = document.createElement("div");
        wrap.className = "suggestions";
        suggestions.forEach(s => {
          const btn = document.createElement("button");
          btn.className = "suggestion-btn";
          btn.textContent = s;
          btn.onclick = () => sendMessage(s);
          wrap.appendChild(btn);
        });
        messagesEl.appendChild(wrap);
      }

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "typingIndicator";
      div.innerHTML = `<div class="avatar">C</div><div class="typing"><span></span><span></span><span></span></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function sendMessage(text) {
      const content = text || inputEl.value.trim();
      if (!content) return;

      history.push({ role: "user", content });
      inputEl.value = "";
      render();
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        hideTyping();

        if (data.text) {
          history.push({ role: "assistant", content: data.text });
        } else {
          history.push({ role: "assistant", content: "Désolé, une erreur s'est produite. Réessaie." });
        }
      } catch (e) {
        hideTyping();
        history.push({ role: "assistant", content: "Erreur de connexion. Vérifie ta connexion internet et réessaie." });
      }

      render();
      sendBtn.disabled = false;
    }

    sendBtn.onclick = () => sendMessage();
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    render();
  </script>
</body>
  </html>

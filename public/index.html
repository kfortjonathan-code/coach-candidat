<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach du candidat — Du collège aux grandes écoles, Côte d'Ivoire</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1F4438" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coach" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF6EC;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: white;
    }
    header {
      background: #1F4438;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #E8C547;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1F4438;
      flex-shrink: 0;
    }
    header h1 {
      color: #FAF6EC;
      font-size: 17px;
      font-weight: 600;
    }
    header p {
      color: #9FC4B3;
      font-size: 12px;
    }
    .logout-btn {
      margin-left: auto;
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #FAF6EC;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      gap: 10px;
      max-width: 90%;
    }
    .msg.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .msg.assistant .avatar { background: #1F4438; color: #E8C547; }
    .msg.user .avatar { background: #E8C547; color: #1F4438; }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble { background: #F1ECDD; color: #2B2B26; border-top-left-radius: 4px; }
    .msg.user .bubble { background: #1F4438; color: #FAF6EC; border-top-right-radius: 4px; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .suggestion-btn {
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(31,68,56,0.2);
      background: white;
      color: #1F4438;
      cursor: pointer;
    }
    .suggestion-btn:hover { background: #1F4438; color: #FAF6EC; }
    .input-area {
      padding: 14px;
      border-top: 1px solid rgba(31,68,56,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .photo-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #F1ECDD;
      border: none;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .photo-preview {
      display: none;
      align-items: center;
      gap: 10px;
      background: #F1ECDD;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .photo-preview.show { display: flex; }
    .photo-preview img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 8px;
    }
    .photo-preview .remove-photo {
      margin-left: auto;
      background: none;
      border: none;
      color: #c0392b;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .msg-image {
      max-width: 200px;
      border-radius: 12px;
      margin-top: 6px;
      display: block;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      max-height: 120px;
    }
    textarea:focus { outline: 2px solid rgba(31,68,56,0.3); }
    button.send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #E8C547;
      border: none;
      font-weight: bold;
      color: #1F4438;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 18px;
    }
    button.send:disabled { opacity: 0.4; cursor: default; }
    .typing { display: flex; gap: 4px; padding: 14px 16px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(31,68,56,0.4);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .install-banner {
      display: none;
      background: #E8C547;
      color: #1F4438;
      padding: 10px 16px;
      font-size: 13px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
    .install-banner.show { display: block; }
    .feedback-btn {
      position: fixed;
      bottom: 80px;
      right: 16px;
      background: #1F4438;
      color: #E8C547;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 10;
    }
    .feedback-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .feedback-overlay.show { display: flex; }
    .feedback-modal {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      width: 100%;
      max-width: 380px;
    }
    .feedback-modal h2 {
      font-size: 17px;
      color: #1F4438;
      margin-bottom: 14px;
    }
    .stars {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .stars span {
      font-size: 32px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s;
    }
    .stars span.active { color: #E8C547; }
    .feedback-modal textarea {
      width: 100%;
      min-height: 80px;
      margin-bottom: 14px;
    }
    .feedback-modal .actions {
      display: flex;
      gap: 10px;
    }
    .feedback-modal button.primary {
      flex: 1;
      background: #1F4438;
      color: #FAF6EC;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      font-size: 14px;
    }
    .feedback-modal button.secondary {
      background: none;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #1F4438;
      font-size: 14px;
    }
    .feedback-thanks {
      text-align: center;
      color: #1F4438;
      font-size: 15px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">C</div>
      <div>
        <h1>Coach du candidat</h1>
        <p>Du collège aux grandes écoles · Côte d'Ivoire</p>
      </div>
      <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </header>

    <div class="install-banner" id="installBanner">📲 Installer Coach sur l'écran d'accueil</div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="photo-preview" id="photoPreview">
        <img id="previewImg" src="" alt="aperçu" />
        <span>Photo ajoutée</span>
        <button class="remove-photo" id="removePhoto">Retirer</button>
      </div>
      <div class="input-row">
        <button class="photo-btn" id="photoBtn">📷</button>
        <textarea id="input" rows="1" placeholder="Pose ta question, demande un exercice..."></textarea>
        <button class="send" id="sendBtn">→</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
    </div>
  </div>

  <button class="feedback-btn" id="feedbackBtn">⭐ Donner mon avis</button>

  <div class="feedback-overlay" id="feedbackOverlay">
    <div class="feedback-modal" id="feedbackModal">
      <h2>Ton avis compte 🙏</h2>
      <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
      </div>
      <textarea id="feedbackText" placeholder="Qu'est-ce qu'on peut améliorer ? (optionnel)"></textarea>
      <div class="actions">
        <button class="secondary" id="feedbackCancel">Annuler</button>
        <button class="primary" id="feedbackSend">Envoyer</button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://amuauikvcjxtexayhkfi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_GT_FKq3vNkt2CTRrJXph6Q_xrveBj6A";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const photoBtn = document.getElementById("photoBtn");
    const fileInput = document.getElementById("fileInput");
    const photoPreview = document.getElementById("photoPreview");
    const previewImg = document.getElementById("previewImg");
    const removePhoto = document.getElementById("removePhoto");
    let selectedImageBase64 = null;
    let selectedImageMediaType = null;

    photoBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        selectedImageBase64 = result.split(",")[1];
        selectedImageMediaType = file.type;
        previewImg.src = result;
        photoPreview.classList.add("show");
      };
      reader.readAsDataURL(file);
    });

    removePhoto.addEventListener("click", () => {
      selectedImageBase64 = null;
      selectedImageMediaType = null;
      fileInput.value = "";
      photoPreview.classList.remove("show");
    });

    let history = [
      { role: "assistant", content: "Salut ! Je suis Coach 👋 Je suis là pour t'aider, que tu sois au collège, au lycée, à l'université ou en grande école. Pour bien t'aider, dis-moi d'abord ton niveau scolaire 🙂", displayText: "Salut ! Je suis Coach 👋 Je suis là pour t'aider, que tu sois au collège, au lycée, à l'université ou en grande école. Pour bien t'aider, dis-moi d'abord ton niveau scolaire 🙂" }
    ];

    const suggestions = [
      "Je suis en classe de sixième",
      "Je suis en classe de cinquième",
      "Je suis en classe de quatrième",
      "Je suis en classe de troisième",
      "Je suis en classe de seconde",
      "Je suis en classe de première",
      "Je suis en classe de terminale",
      "Je suis étudiant",
      "Je suis étudiante"
    ];

    function render() {
      messagesEl.innerHTML = "";
      history.forEach(m => {
        const div = document.createElement("div");
        div.className = "msg " + m.role;
        div.innerHTML = `
          <div class="avatar">${m.role === "assistant" ? "C" : "Toi"}</div>
          <div class="bubble"></div>
        `;
        const bubble = div.querySelector(".bubble");
        if (m.role === "user" && m.displayImage) {
          const img = document.createElement("img");
          img.src = m.displayImage;
          img.className = "msg-image";
          bubble.appendChild(img);
          if (m.displayText) {
            const p = document.createElement("div");
            p.textContent = m.displayText;
            p.style.marginTop = "6px";
            bubble.appendChild(p);
          }
        } else {
          bubble.textContent = m.role === "assistant" ? m.content : (m.displayText !== undefined ? m.displayText : m.content);
        }
        messagesEl.appendChild(div);
      });

      if (history.length === 1) {
        const wrap = document.createElement("div");
        wrap.className = "suggestions";
        suggestions.forEach(s => {
          const btn = document.createElement("button");
          btn.className = "suggestion-btn";
          btn.textContent = s;
          btn.onclick = () => sendMessage(s);
          wrap.appendChild(btn);
        });
        messagesEl.appendChild(wrap);
      }

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "typingIndicator";
      div.innerHTML = `<div class="avatar">C</div><div class="typing"><span></span><span></span><span></span></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function sendMessage(text) {
      const content = text || inputEl.value.trim();
      if (!content && !selectedImageBase64) return;

      let userMessageContent;
      let displayImageSrc = null;

      if (selectedImageBase64) {
        displayImageSrc = `data:${selectedImageMediaType};base64,${selectedImageBase64}`;
        userMessageContent = [
          { type: "image", source: { type: "base64", media_type: selectedImageMediaType, data: selectedImageBase64 } },
          { type: "text", text: content || "Voici une photo de mon exercice, aide-moi." }
        ];
      } else {
        userMessageContent = content;
      }

      history.push({ role: "user", content: userMessageContent, displayText: content, displayImage: displayImageSrc });
      inputEl.value = "";
      selectedImageBase64 = null;
      selectedImageMediaType = null;
      fileInput.value = "";
      photoPreview.classList.remove("show");
      render();
      sendBtn.disabled = true;
      showTyping();

      if (!currentUser) {
        hideTyping();
        history.push({ role: "assistant", content: "Ta session a expiré, reconnecte-toi pour continuer." });
        render();
        sendBtn.disabled = false;
        return;
      }

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: history.map(m => ({ role: m.role, content: m.content })),
            userId: currentUser.id
          })
        });
        const data = await res.json();
        hideTyping();

        if (data.text) {
          history.push({ role: "assistant", content: data.text });
        } else if (data.code === "NO_CREDITS") {
          history.push({ role: "assistant", content: "Tu n'as plus de crédits questions pour le moment. Reviens bientôt pour en obtenir d'autres 🙂" });
        } else {
          history.push({ role: "assistant", content: "Désolé, une erreur s'est produite. Réessaie." });
        }
      } catch (e) {
        hideTyping();
        history.push({ role: "assistant", content: "Erreur de connexion. Vérifie ta connexion internet et réessaie." });
      }

      render();
      sendBtn.disabled = false;
    }

    sendBtn.onclick = () => sendMessage();
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    render();

    (async () => {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "/login.html";
        return;
      }
      currentUser = data.session.user;
    })();

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    });

    let deferredPrompt;
    const installBanner = document.getElementById("installBanner");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.classList.add("show");
    });

    installBanner.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.classList.remove("show");
    });

    window.addEventListener("appinstalled", () => {
      installBanner.classList.remove("show");
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }

    const feedbackBtn = document.getElementById("feedbackBtn");
    const feedbackOverlay = document.getElementById("feedbackOverlay");
    const feedbackModal = document.getElementById("feedbackModal");
    const feedbackCancel = document.getElementById("feedbackCancel");
    const feedbackSend = document.getElementById("feedbackSend");
    const feedbackText = document.getElementById("feedbackText");
    const starsEl = document.querySelectorAll("#stars span");
    let selectedRating = 0;

    feedbackBtn.onclick = () => {
      feedbackOverlay.classList.add("show");
    };

    feedbackCancel.onclick = () => {
      feedbackOverlay.classList.remove("show");
    };

    starsEl.forEach(star => {
      star.addEventListener("click", () => {
        selectedRating = parseInt(star.dataset.value);
        starsEl.forEach(s => {
          s.classList.toggle("active", parseInt(s.dataset.value) <= selectedRating);
        });
      });
    });

    feedbackSend.onclick = async () => {
      if (selectedRating === 0) {
        alert("Choisis au moins une étoile avant d'envoyer 🙂");
        return;
      }
      const payload = {
        rating: selectedRating,
        comment: feedbackText.value.trim(),
        date: new Date().toISOString()
      };
      try {
        await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } catch (e) {
      }
      feedbackModal.innerHTML = '<div class="feedback-thanks">Merci pour ton retour ! 🙌<br>Ça aide à améliorer Coach.</div>';
      setTimeout(() => {
        feedbackOverlay.classList.remove("show");
      }, 1800);
    };
  </script>
</body>
</html>

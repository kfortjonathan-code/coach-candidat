<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach du candidat — Du collège aux grandes écoles, Côte d'Ivoire</title>
  <meta name="google-site-verification" content="bdCNKBfBZWkyTpe2HNmsd5TnwmKz6Jd9L5ul757HUo4" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1F4438" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coach" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF6EC;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: white;
    }
    header {
      background: #1F4438;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #E8C547;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1F4438;
      flex-shrink: 0;
    }
    header h1 {
      color: #FAF6EC;
      font-size: 17px;
      font-weight: 600;
    }
    header p {
      color: #9FC4B3;
      font-size: 12px;
    }
    .logout-btn {
      margin-left: auto;
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #FAF6EC;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      gap: 10px;
      max-width: 90%;
    }
    .msg.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .msg.assistant .avatar { background: #1F4438; color: #E8C547; }
    .msg.user .avatar { background: #E8C547; color: #1F4438; }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble { background: #F1ECDD; color: #2B2B26; border-top-left-radius: 4px; }
    .msg.user .bubble { background: #1F4438; color: #FAF6EC; border-top-right-radius: 4px; }
    .input-area {
      position: relative;
      padding: 14px;
      border-top: 1px solid rgba(31,68,56,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .photo-btn, .mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #F1ECDD;
      border: none;
      font-size: 19px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .mic-btn.recording {
      background: #c0392b;
      color: white;
      animation: pulse-mic 1s infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .photo-menu {
      display: none;
      flex-direction: column;
      position: absolute;
      bottom: 100%;
      left: 14px;
      margin-bottom: 8px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      overflow: hidden;
      z-index: 15;
    }
    .photo-menu.show { display: flex; }
    .photo-menu button {
      background: none;
      border: none;
      padding: 13px 18px;
      font-size: 14px;
      color: #1F4438;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
    }
    .photo-menu button:not(:last-child) { border-bottom: 1px solid rgba(31,68,56,0.1); }
    .photo-preview {
      display: none;
      align-items: center;
      gap: 10px;
      background: #F1ECDD;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .photo-preview.show { display: flex; }
    .photo-preview img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 8px;
    }
    .photo-preview .remove-photo {
      margin-left: auto;
      background: none;
      border: none;
      color: #c0392b;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .msg-image {
      max-width: 200px;
      border-radius: 12px;
      margin-top: 6px;
      display: block;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      max-height: 120px;
    }
    textarea:focus { outline: 2px solid rgba(31,68,56,0.3); }
    button.send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #E8C547;
      border: none;
      font-weight: bold;
      color: #1F4438;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 18px;
    }
    button.send:disabled { opacity: 0.4; cursor: default; }
    .typing { display: flex; gap: 4px; padding: 14px 16px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(31,68,56,0.4);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .install-banner {
      display: none;
      background: #E8C547;
      color: #1F4438;
      padding: 10px 16px;
      font-size: 13px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
    .install-banner.show { display: block; }
    .feedback-btn {
      position: fixed;
      bottom: 80px;
      right: 16px;
      background: #1F4438;
      color: #E8C547;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 10;
    }
    .level-btn {
      position: fixed;
      bottom: 80px;
      left: 16px;
      background: #E8C547;
      color: #1F4438;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 10;
    }
    .level-menu {
      display: none;
      flex-direction: column;
      position: fixed;
      bottom: 130px;
      left: 16px;
      width: min(300px, calc(100vw - 32px));
      max-height: 55vh;
      overflow-y: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      z-index: 25;
    }
    .level-menu.show { display: flex; }
    .level-menu button {
      background: none;
      border: none;
      padding: 12px 16px;
      font-size: 14px;
      text-align: left;
      color: #1F4438;
      cursor: pointer;
      white-space: normal;
      line-height: 1.4;
    }
    .level-menu button:not(:last-child) { border-bottom: 1px solid rgba(31,68,56,0.1); }
    .feedback-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .feedback-overlay.show { display: flex; }
    .feedback-modal {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      width: 100%;
      max-width: 380px;
    }
    .feedback-modal h2 {
      font-size: 17px;
      color: #1F4438;
      margin-bottom: 14px;
    }
    .stars {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .stars span {
      font-size: 32px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s;
    }
    .stars span.active { color: #E8C547; }
    .feedback-modal textarea {
      width: 100%;
      min-height: 80px;
      margin-bottom: 14px;
    }
    .feedback-modal .actions {
      display: flex;
      gap: 10px;
    }
    .feedback-modal button.primary {
      flex: 1;
      background: #1F4438;
      color: #FAF6EC;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      font-size: 14px;
    }
    .feedback-modal button.secondary {
      background: none;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #1F4438;
      font-size: 14px;
    }
    .feedback-thanks {
      text-align: center;
      color: #1F4438;
      font-size: 15px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">C</div>
      <div>
        <h1>Coach du candidat</h1>
        <p>Du collège aux grandes écoles · Côte d'Ivoire</p>
      </div>
      <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </header>

    <div class="install-banner" id="installBanner">📲 Installer Coach sur l'écran d'accueil</div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="photo-menu" id="photoMenu">
        <button id="takePhotoBtn">📷 Prendre une photo</button>
        <button id="choosePhotoBtn">🖼️ Choisir dans la galerie</button>
      </div>
      <div class="photo-preview" id="photoPreview">
        <img id="previewImg" src="" alt="aperçu" />
        <span>Photo ajoutée</span>
        <button class="remove-photo" id="removePhoto">Retirer</button>
      </div>
      <div class="input-row">
        <button class="photo-btn" id="photoBtn">📷</button>
        <button class="mic-btn" id="micBtn">🎤</button>
        <textarea id="input" rows="1" placeholder="Pose ta question, demande un exercice..."></textarea>
        <button class="send" id="sendBtn">→</button>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" />
      <input type="file" id="galleryInput" accept="image/*" style="display:none" />
    </div>
  </div>

  <button class="level-btn" id="levelBtn">🎓 Mon niveau</button>
  <div class="level-menu" id="levelMenu"></div>

  <button class="feedback-btn" id="feedbackBtn">⭐ Donner mon avis</button>

  <div class="feedback-overlay" id="feedbackOverlay">
    <div class="feedback-modal" id="feedbackModal">
      <h2>Ton avis compte 🙏</h2>
      <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
      </div>
      <textarea id="feedbackText" placeholder="Qu'est-ce qu'on peut améliorer ? (optionnel)"></textarea>
      <div class="actions">
        <button class="secondary" id="feedbackCancel">Annuler</button>
        <button class="primary" id="feedbackSend">Envoyer</button>
      </div>
    </div>
        </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://amuauikvcjxtexayhkfi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_GT_FKq3vNkt2CTRrJXph6Q_xrveBj6A";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const photoBtn = document.getElementById("photoBtn");
    const photoMenu = document.getElementById("photoMenu");
    const takePhotoBtn = document.getElementById("takePhotoBtn");
    const choosePhotoBtn = document.getElementById("choosePhotoBtn");
    const cameraInput = document.getElementById("cameraInput");
    const galleryInput = document.getElementById("galleryInput");
    const photoPreview = document.getElementById("photoPreview");
    const previewImg = document.getElementById("previewImg");
    const removePhoto = document.getElementById("removePhoto");
    const micBtn = document.getElementById("micBtn");
    const levelBtn = document.getElementById("levelBtn");
    const levelMenu = document.getElementById("levelMenu");
    let selectedImageBase64 = null;
    let selectedImageMediaType = null;

    photoBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      photoMenu.classList.toggle("show");
    });

    takePhotoBtn.addEventListener("click", () => {
      photoMenu.classList.remove("show");
      cameraInput.click();
    });

    choosePhotoBtn.addEventListener("click", () => {
      photoMenu.classList.remove("show");
      galleryInput.click();
    });

    function handleFileSelect(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        selectedImageBase64 = result.split(",")[1];
        selectedImageMediaType = file.type;
        previewImg.src = result;
        photoPreview.classList.add("show");
      };
      reader.readAsDataURL(file);
    }

    cameraInput.addEventListener("change", () => {
      handleFileSelect(cameraInput.files[0]);
    });

    galleryInput.addEventListener("change", () => {
      handleFileSelect(galleryInput.files[0]);
    });

    removePhoto.addEventListener("click", () => {
      selectedImageBase64 = null;
      selectedImageMediaType = null;
      cameraInput.value = "";
      galleryInput.value = "";
      photoPreview.classList.remove("show");
    });

    let recognition = null;
    let isRecording = false;

    micBtn.addEventListener("click", () => {
      const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognitionAPI) {
        alert("La saisie vocale n'est pas disponible sur ce navigateur. Essaie avec Chrome sur Android.");
        return;
      }

      if (isRecording && recognition) {
        recognition.stop();
        return;
      }

      recognition = new SpeechRecognitionAPI();
      recognition.lang = "fr-FR";
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add("recording");
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        inputEl.value = inputEl.value.trim() ? inputEl.value.trim() + " " + transcript : transcript;
      };

      recognition.onerror = (event) => {
        if (event.error === "not-allowed" || event.error === "permission-denied") {
          alert("Autorise l'accès au microphone pour utiliser la saisie vocale.");
        }
      };

      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove("recording");
      };

      recognition.start();
    });

    let history = [
      { role: "assistant", content: "Salut ! Je suis Coach 👋 Je suis là pour t'aider, que tu sois au collège, au lycée, à l'université ou en grande école. Pour bien t'aider, dis-moi d'abord ton niveau scolaire avec le bouton 🎓 Mon niveau en bas de l'écran 🙂", displayText: "Salut ! Je suis Coach 👋 Je suis là pour t'aider, que tu sois au collège, au lycée, à l'université ou en grande école. Pour bien t'aider, dis-moi d'abord ton niveau scolaire avec le bouton 🎓 Mon niveau en bas de l'écran 🙂" }
    ];

    const suggestions = [
      "Je suis en classe de sixième",
      "Je suis en classe de cinquième",
      "Je suis en classe de quatrième",
      "Je suis en classe de troisième",
      "Je suis en lycée général (seconde, première et terminale)",
      "Je suis en lycée technique (première année, deuxième année et troisième année)",
      "Je suis en lycée professionnel (première année, deuxième année et troisième année)",
      "Je suis étudiant",
      "Je suis étudiante"
    ];

    suggestions.forEach(s => {
      const btn = document.createElement("button");
      btn.textContent = s;
      btn.addEventListener("click", () => {
        levelMenu.classList.remove("show");
        sendMessage(s);
      });
      levelMenu.appendChild(btn);
    });

    levelBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      levelMenu.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
      if (!photoMenu.contains(e.target) && e.target !== photoBtn) {
        photoMenu.classList.remove("show");
      }
      if (!levelMenu.contains(e.target) && e.target !== levelBtn) {
        levelMenu.classList.remove("show");
      }
    });

    function render() {
      messagesEl.innerHTML = "";
      history.forEach(m => {
        const div = document.createElement("div");
        div.className = "msg " + m.role;
        div.innerHTML = `
          <div class="avatar">${m.role === "assistant" ? "C" : "Toi"}</div>
          <div class="bubble"></div>
        `;
        const bubble = div.querySelector(".bubble");
        if (m.role === "user" && m.displayImage) {
          const img = document.createElement("img");
          img.src = m.displayImage;
          img.className = "msg-image";
          bubble.appendChild(img);
          if (m.displayText) {
            const p = document.createElement("div");
            p.textContent = m.displayText;
            p.style.marginTop = "6px";
            bubble.appendChild(p);
          }
        } else {
          bubble.textContent = m.role === "assistant" ? m.content : (m.displayText !== undefined ? m.displayText : m.content);
        }
        messagesEl.appendChild(div);
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.id = "typingIndicator";
      div.innerHTML = `<div class="avatar">C</div><div class="typing"><span></span><span></span><span></span></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function sendMessage(text) {
      const content = text || inputEl.value.trim();
      if (!content && !selectedImageBase64) return;

      let userMessageContent;
      let displayImageSrc = null;

      if (selectedImageBase64) {
        displayImageSrc = `data:${selectedImageMediaType};base64,${selectedImageBase64}`;
        userMessageContent = [
          { type: "image", source: { type: "base64", media_type: selectedImageMediaType, data: selectedImageBase64 } },
          { type: "text", text: content || "Voici une photo de mon exercice, aide-moi." }
        ];
      } else {
        userMessageContent = content;
      }

      history.push({ role: "user", content: userMessageContent, displayText: content, displayImage: displayImageSrc });
      inputEl.value = "";
      selectedImageBase64 = null;
      selectedImageMediaType = null;
      cameraInput.value = "";
      galleryInput.value = "";
      photoPreview.classList.remove("show");
      render();
      sendBtn.disabled = true;
      showTyping();

      if (!currentUser) {
        hideTyping();
        history.push({ role: "assistant", content: "Ta session a expiré, reconnecte-toi pour continuer." });
        render();
        sendBtn.disabled = false;
        return;
      }

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: history.map(m => ({ role: m.role, content: m.content })),
            userId: currentUser.id
          })
        });
        const data = await res.json();
        hideTyping();

        if (data.text) {
          history.push({ role: "assistant", content: data.text });
        } else if (data.code === "NO_CREDITS") {
          history.push({ role: "assistant", content: "Tu n'as plus de crédits questions pour le moment. Reviens bientôt pour en obtenir d'autres 🙂" });
        } else {
          history.push({ role: "assistant", content: "Désolé, une erreur s'est produite. Réessaie." });
        }
      } catch (e) {
        hideTyping();
        history.push({ role: "assistant", content: "Erreur de connexion. Vérifie ta connexion internet et réessaie." });
      }

      render();
      sendBtn.disabled = false;
    }

    sendBtn.onclick = () => sendMessage();
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    render();

    (async () => {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "/login.html";
        return;
      }
      currentUser = data.session.user;
    })();

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    });

    let deferredPrompt;
    const installBanner = document.getElementById("installBanner");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.classList.add("show");
    });

    installBanner.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.classList.remove("show");
    });

    window.addEventListener("appinstalled", () => {
      installBanner.classList.remove("show");
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }

    const feedbackBtn = document.getElementById("feedbackBtn");
    const feedbackOverlay = document.getElementById("feedbackOverlay");
    const feedbackModal = document.getElementById("feedbackModal");
    const feedbackCancel = document.getElementById("feedbackCancel");
    const feedbackSend = document.getElementById("feedbackSend");
    const feedbackText = document.getElementById("feedbackText");
    const starsEl = document.querySelectorAll("#stars span");
    let selectedRating = 0;

    feedbackBtn.onclick = () => {
      feedbackOverlay.classList.add("show");
    };

    feedbackCancel.onclick = () => {
      feedbackOverlay.classList.remove("show");
    };

    starsEl.forEach(star => {
      star.addEventListener("click", () => {
        selectedRating = parseInt(star.dataset.value);
        starsEl.forEach(s => {
          s.classList.toggle("active", parseInt(s.dataset.value) <= selectedRating);
        });
      });
    });

    feedbackSend.onclick = async () => {
      if (selectedRating === 0) {
        alert("Choisis au moins une étoile avant d'envoyer 🙂");
        return;
      }
      const payload = {
        rating: selectedRating,
        comment: feedbackText.value.trim(),
        date: new Date().toISOString()
      };
      try {
        await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } catch (e) {
      }
      feedbackModal.innerHTML = '<div class="feedback-thanks">Merci pour ton retour ! 🙌<br>Ça aide à améliorer Coach.</div>';
      setTimeout(() => {
        feedbackOverlay.classList.remove("show");
      }, 1800);
    };
  </script>
</body>
</html>

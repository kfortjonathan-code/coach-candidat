<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Coach du candidat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF6EC;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 22px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #E8C547;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1F4438;
      font-size: 20px;
      margin: 0 auto 16px;
    }
    h1 {
      text-align: center;
      font-size: 18px;
      color: #1F4438;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">C</div>
    <h1>Test étape 2 : si tu vois une carte blanche avec un rond jaune "C", le CSS fonctionne</h1>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Coach du candidat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF6EC;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 22px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #E8C547;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1F4438;
      font-size: 20px;
      margin: 0 auto 16px;
    }
    h1 {
      text-align: center;
      font-size: 18px;
      color: #1F4438;
      margin-bottom: 4px;
    }
    p.subtitle {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #1F4438;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    input:focus { outline: 2px solid rgba(31,68,56,0.3); }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 44px;
    }
    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 12px;
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }
    button.main {
      width: 100%;
      background: #1F4438;
      color: #FAF6EC;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    button.main:disabled { opacity: 0.5; }
    .switch {
      text-align: center;
      font-size: 13px;
      color: #1F4438;
    }
    .switch span {
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }
    .message {
      text-align: center;
      font-size: 13px;
      margin-bottom: 14px;
      min-height: 18px;
    }
    .message.error { color: #c0392b; }
    .message.success { color: #1F7A4D; }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 16px 0 18px;
      color: #999;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid rgba(31,68,56,0.15);
    }
    .divider span { padding: 0 10px; }
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      border: 1px solid rgba(31,68,56,0.2);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #1F4438;
      cursor: pointer;
    }
    .google-btn:disabled { opacity: 0.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">C</div>
    <h1 id="formTitle">Connexion</h1>
    <p class="subtitle">Coach du candidat — accède à ton espace</p>

    <div class="message" id="message"></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="ton@email.com" />

    <label for="password">Mot de passe</label>
    <div class="password-wrap">
      <input type="password" id="password" placeholder="••••••••" />
      <span class="toggle-eye" id="toggleEye">👁</span>
    </div>

    <button class="main" id="submitBtn">Se connecter</button>

    <div class="divider"><span>ou</span></div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.617z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 16.018 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 1.982.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Se connecter avec Google
    </button>

    <p class="switch" id="switchText" style="margin-top: 14px;">
      Pas encore de compte ? <span id="switchLink">Créer un compte</span>
    </p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://amuauikvcjxtexayhkfi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_GT_FKq3vNkt2CTRrJXph6Q_xrveBj6A";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let mode = "login";

    const formTitle = document.getElementById("formTitle");
    const switchText = document.getElementById("switchText");
    const switchLink = document.getElementById("switchLink");
    const submitBtn = document.getElementById("submitBtn");
    const messageEl = document.getElementById("message");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const toggleEye = document.getElementById("toggleEye");
    const googleBtn = document.getElementById("googleBtn");

    toggleEye.addEventListener("click", () => {
      if (passwordEl.type === "password") {
        passwordEl.type = "text";
        toggleEye.textContent = "🙈";
      } else {
        passwordEl.type = "password";
        toggleEye.textContent = "👁";
      }
    });

    function setMode(newMode) {
      mode = newMode;
      messageEl.textContent = "";
      if (mode === "login") {
        formTitle.textContent = "Connexion";
        submitBtn.textContent = "Se connecter";
        switchText.innerHTML = 'Pas encore de compte ? <span id="switchLink">Créer un compte</span>';
      } else {
        formTitle.textContent = "Créer un compte";
        submitBtn.textContent = "S'inscrire";
        switchText.innerHTML = 'Déjà un compte ? <span id="switchLink">Se connecter</span>';
      }
      document.getElementById("switchLink").addEventListener("click", () => {
        setMode(mode === "login" ? "signup" : "login");
      });
    }

    switchLink.addEventListener("click", () => {
      setMode(mode === "login" ? "signup" : "login");
    });

    submitBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!email || !password) {
        messageEl.textContent = "Remplis l'email et le mot de passe.";
        messageEl.className = "message error";
        return;
      }

      submitBtn.disabled = true;
      messageEl.textContent = "";

      try {
        let result;
        if (mode === "signup") {
          result = await supabase.auth.signUp({ email, password });
        } else {
          result = await supabase.auth.signInWithPassword({ email, password });
        }

        if (result.error) {
          messageEl.textContent = result.error.message;
          messageEl.className = "message error";
          submitBtn.disabled = false;
          return;
        }

        if (mode === "signup") {
          messageEl.textContent = "Compte créé ! Tu peux maintenant te connecter.";
          messageEl.className = "message success";
          setMode("login");
          submitBtn.disabled = false;
        } else {
          messageEl.textContent = "Connexion réussie, redirection...";
          messageEl.className = "message success";
          window.location.href = "/index.html";
        }
      } catch (e) {
        messageEl.textContent = "Une erreur s'est produite. Réessaie.";
        messageEl.className = "message error";
        submitBtn.disabled = false;
      }
    });

    googleBtn.addEventListener("click", async () => {
      googleBtn.disabled = true;
      messageEl.textContent = "";
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/index.html"
        }
      });
      if (error) {
        messageEl.textContent = "Erreur de connexion Google. Réessaie.";
        messageEl.className = "message error";
        googleBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
